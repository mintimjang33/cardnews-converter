<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>카드뉴스 변환기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
    gap: 20px;
  }
  h1 { font-size: 30px; font-weight: 900; background: linear-gradient(90deg, #FF4B6E, #ff8c42); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { font-size: 14px; color: #555; }
  .section { width: 100%; max-width: 660px; background: #1a1a1a; border-radius: 20px; padding: 24px 28px; }
  .section-title { font-size: 15px; font-weight: 700; color: #FF4B6E; margin-bottom: 14px; }
  .row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
  .label { font-size: 13px; color: #888; width: 90px; flex-shrink: 0; }
  input[type=text], input[type=password], input[type=number], select {
    flex: 1; background: #111; border: 1.5px solid #2a2a2a; border-radius: 10px;
    padding: 10px 14px; color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: #FF4B6E; }
  input::placeholder { color: #444; }
  .btn-sm { background: #FF4B6E; border: none; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .btn-sm:hover { opacity: 0.85; }
  .api-status { font-size: 12px; color: #555; margin-top: 6px; }
  .api-status.ok { color: #00B894; }
  .hint { font-size: 12px; color: #444; margin-top: 4px; }

  .upload-zone { width: 100%; max-width: 660px; border: 2px dashed #252525; border-radius: 20px; padding: 44px; text-align: center; cursor: pointer; transition: all 0.2s; background: #141414; }
  .upload-zone:hover, .upload-zone.drag { border-color: #FF4B6E; background: #1a1010; }
  .upload-icon { font-size: 44px; margin-bottom: 10px; }
  .upload-text { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .upload-sub { font-size: 13px; color: #444; }
  #file-input { display: none; }

  .status-box { width: 100%; max-width: 660px; background: #1a1a1a; border-radius: 16px; padding: 22px 26px; display: none; }
  .status-box.show { display: block; }
  .status-title { font-size: 15px; font-weight: 700; color: #FF4B6E; margin-bottom: 12px; }
  .progress-bar { width: 100%; height: 5px; background: #222; border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #FF4B6E, #ff8c42); border-radius: 3px; transition: width 0.4s; width: 0%; }
  .status-log { font-size: 12px; color: #555; line-height: 1.9; max-height: 110px; overflow-y: auto; }

  .preview-section { width: 100%; max-width: 660px; background: #1a1a1a; border-radius: 20px; padding: 22px 26px; display: none; }
  .preview-section.show { display: block; }
  .slide-count-badge { display: inline-block; background: #FF4B6E; color: #fff; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-left: 10px; }
  .thumbs-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 14px; }
  .thumb { aspect-ratio: 4/5; border-radius: 8px; overflow: hidden; background: #222; position: relative; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
  .thumb:hover { border-color: #FF4B6E; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .thumb-badge { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.75); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; }
  .thumb-audio { position: absolute; bottom: 4px; left: 4px; font-size: 12px; }

  .player-wrap { width: 100%; max-width: 660px; background: #1a1a1a; border-radius: 20px; padding: 22px; display: none; }
  .player-wrap.show { display: block; }
  .player-screen { width: 100%; aspect-ratio: 4/5; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
  .player-screen img { width: 100%; height: 100%; object-fit: contain; }
  .player-controls { display: flex; align-items: center; gap: 10px; }
  .ctrl { background: #252525; border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 15px; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; }
  .ctrl:hover { background: #FF4B6E; }
  .ctrl.play { background: #FF4B6E; width: 48px; height: 48px; font-size: 18px; }
  .slide-info { flex: 1; text-align: center; font-size: 13px; color: #555; }
  audio { width: 100%; margin-top: 12px; filter: invert(1) hue-rotate(180deg); }

  .btn-group { width: 100%; max-width: 660px; display: none; flex-direction: column; gap: 10px; }
  .btn-group.show { display: flex; }
  .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-png { background: #FF4B6E; color: #fff; }
  .btn-video { background: #6c5ce7; color: #fff; }
  .btn-reset { background: #1e1e1e; color: #666; font-size: 14px; padding: 12px; }

  #render-area { position: fixed; left: -9999px; top: 0; width: 1080px; }
</style>
</head>
<body>

<h1>🃏 카드뉴스 변환기</h1>
<p class="sub">HTML 업로드 → 슬라이드 자동 감지 → PNG + TTS 음성 + 영상 생성</p>

<!-- API 키 -->
<div class="section">
  <div class="section-title">🔑 fal.ai API 키</div>
  <div class="row">
    <input type="password" id="api-key" placeholder="fal.ai API 키 (fal_...)">
    <button class="btn-sm" onclick="saveKey()">저장</button>
  </div>
  <div class="api-status" id="api-status">API 키를 입력하면 TTS 음성 기능이 활성화됩니다</div>
</div>

<!-- TTS + 설정 -->
<div class="section">
  <div class="section-title">⚙️ 변환 설정</div>
  <div class="row">
    <div class="label">TTS 모델</div>
    <select id="tts-model">
      <option value="fal-ai/gemini-tts">Gemini TTS ⭐ (한국어 추천)</option>
      <option value="fal-ai/minimax/speech-02-hd">MiniMax HD (자연스러운 발음)</option>
      <option value="fal-ai/elevenlabs/tts/eleven-v3">ElevenLabs v3 (감정표현 최고)</option>
      <option value="fal-ai/index-tts-2/text-to-speech">Index TTS 2.0 (저렴)</option>
      <option value="none">TTS 없이 (PNG만)</option>
    </select>
  </div>
  <div class="row">
    <div class="label">슬라이드 시간</div>
    <select id="slide-duration">
      <option value="auto">음성 끝나면 자동 넘김</option>
      <option value="2000">2초 고정</option>
      <option value="3000">3초 고정</option>
      <option value="5000">5초 고정</option>
    </select>
  </div>
  <div class="row">
    <div class="label">장수 지정</div>
    <input type="number" id="slide-limit" placeholder="비워두면 자동 감지 (전체)" min="1" max="50">
  </div>
  <div class="hint">* 장수를 입력하면 해당 장수까지만 처리합니다. 비워두면 HTML의 모든 슬라이드를 자동으로 감지합니다.</div>
</div>

<!-- 업로드 -->
<div class="upload-zone" id="upload-zone">
  <div class="upload-icon">📂</div>
  <div class="upload-text">HTML 파일을 드래그하거나 클릭하세요</div>
  <div class="upload-sub">Claude가 만들어준 카드뉴스 HTML 파일</div>
  <input type="file" id="file-input" accept=".html">
</div>

<!-- 진행 상태 -->
<div class="status-box" id="status-box">
  <div class="status-title" id="status-title">처리 중...</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="status-log" id="status-log"></div>
</div>

<!-- 미리보기 -->
<div class="preview-section" id="preview-section">
  <div class="section-title">
    📋 슬라이드 미리보기
    <span class="slide-count-badge" id="slide-count-badge">0장</span>
  </div>
  <div class="thumbs-grid" id="thumbs-grid"></div>
</div>

<!-- 플레이어 -->
<div class="player-wrap" id="player-wrap">
  <div class="player-screen"><img id="player-img" src="" alt=""></div>
  <div class="player-controls">
    <button class="ctrl" onclick="prevSlide()">◀</button>
    <button class="ctrl play" id="play-btn" onclick="togglePlay()">▶</button>
    <button class="ctrl" onclick="nextSlide()">▶▶</button>
    <div class="slide-info" id="slide-info">- / -</div>
  </div>
  <audio id="audio-player" controls style="display:none"></audio>
</div>

<!-- 다운로드 -->
<div class="btn-group" id="btn-group">
  <button class="btn btn-png" onclick="downloadZip()">📦 PNG 전체 다운로드 (ZIP)</button>
  <button class="btn btn-video" id="btn-video" onclick="downloadVideo()">🎬 음성 포함 영상 다운로드 (WebM)</button>
  <button class="btn btn-reset" onclick="resetAll()">🔄 다른 파일 변환하기</button>
</div>

<div id="render-area"></div>

<script>
  let slides = [];
  let currentSlide = 0;
  let isPlaying = false;
  let playTimer = null;
  let falKey = localStorage.getItem('fal_key') || '';

  if (falKey) {
    document.getElementById('api-key').value = falKey;
    document.getElementById('api-status').textContent = '✅ API 키 저장됨 — TTS 활성화';
    document.getElementById('api-status').className = 'api-status ok';
  }

  function saveKey() {
    falKey = document.getElementById('api-key').value.trim();
    if (!falKey) return;
    localStorage.setItem('fal_key', falKey);
    document.getElementById('api-status').textContent = '✅ API 키 저장됨 — TTS 활성화';
    document.getElementById('api-status').className = 'api-status ok';
  }

  const uploadZone = document.getElementById('upload-zone');
  const fileInput = document.getElementById('file-input');
  uploadZone.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
  uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag'); if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

  function log(msg) {
    const el = document.getElementById('status-log');
    el.innerHTML += msg + '<br>';
    el.scrollTop = el.scrollHeight;
  }
  function setProgress(pct, title) {
    document.getElementById('progress-fill').style.width = pct + '%';
    if (title) document.getElementById('status-title').textContent = title;
  }

  async function processFile(file) {
    slides = [];
    document.getElementById('status-box').classList.add('show');
    document.getElementById('status-log').innerHTML = '';
    document.getElementById('preview-section').classList.remove('show');
    document.getElementById('player-wrap').classList.remove('show');
    document.getElementById('btn-group').classList.remove('show');
    setProgress(5, '📄 HTML 읽는 중...');

    const html = await file.text();
    const renderArea = document.getElementById('render-area');
    renderArea.innerHTML = '';

    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'width:1080px;height:9999px;border:none;';
    renderArea.appendChild(iframe);
    iframe.srcdoc = html;
    await new Promise(r => iframe.addEventListener('load', r));
    await new Promise(r => setTimeout(r, 2000));

    setProgress(15, '🔍 슬라이드 감지 중...');
    const iDoc = iframe.contentDocument;
    let cards = Array.from(iDoc.querySelectorAll('.card'));

    if (!cards.length) {
      setProgress(0, '❌ 슬라이드를 찾지 못했어요');
      log('class="card" 요소가 없어요. Claude가 만든 HTML인지 확인해주세요.');
      return;
    }

    // 장수 제한 적용
    const limitInput = document.getElementById('slide-limit').value;
    const limit = limitInput ? parseInt(limitInput) : cards.length;
    cards = cards.slice(0, limit);

    log(`✅ 총 ${iDoc.querySelectorAll('.card').length}장 감지 → ${cards.length}장 처리`);
    document.getElementById('slide-count-badge').textContent = cards.length + '장';

    const ttsModel = document.getElementById('tts-model').value;
    const total = cards.length;

    // PNG 캡처
    for (let i = 0; i < total; i++) {
      setProgress(15 + Math.round((i / total) * 40), `🖼️ ${i+1}/${total}장 캡처 중...`);
      const card = cards[i];

      // 텍스트 추출
      const selectors = ['.hook', '.title', '.body', '.fact-text', '.vs-content', '.tl-text', '.quote-text', '.cta-main', '.cta-sub'];
      let text = '';
      selectors.forEach(sel => {
        card.querySelectorAll(sel).forEach(n => { text += n.innerText.trim() + ' '; });
      });
      if (!text.trim()) text = card.innerText.replace(/\s+/g, ' ').trim().substring(0, 400);

      const canvas = await html2canvas(card, {
        width: 1080, height: 1350, scale: 1,
        useCORS: true, allowTaint: true, backgroundColor: null, logging: false,
      });

      slides.push({
        dataUrl: canvas.toDataURL('image/png'),
        name: `slide_${String(i+1).padStart(2,'0')}.png`,
        text: text.trim(),
        audioUrl: null,
        audioDuration: 3
      });
      log(`  📸 ${i+1}장 캡처 완료`);
    }

    renderArea.innerHTML = '';

    // TTS 생성
    if (falKey && ttsModel !== 'none') {
      for (let i = 0; i < slides.length; i++) {
        setProgress(55 + Math.round((i / slides.length) * 35), `🎙️ ${i+1}/${slides.length}장 음성 생성 중...`);
        log(`  🔊 ${i+1}장 TTS 요청...`);
        try {
          const audioUrl = await generateTTS(slides[i].text, ttsModel);
          slides[i].audioUrl = audioUrl;
          const dur = await getAudioDuration(audioUrl);
          slides[i].audioDuration = dur;
          log(`  ✅ ${i+1}장 음성 완료 (${dur.toFixed(1)}초)`);
        } catch(e) {
          log(`  ⚠️ ${i+1}장 음성 실패: ${e.message}`);
        }
      }
    } else if (ttsModel === 'none') {
      log('TTS 없이 PNG만 생성합니다');
    } else {
      log('⚠️ API 키 없음 — PNG만 생성합니다');
    }

    setProgress(100, '🎉 완성!');
    renderThumbs();
    goToSlide(0);

    setTimeout(() => {
      document.getElementById('status-box').classList.remove('show');
      document.getElementById('preview-section').classList.add('show');
      document.getElementById('player-wrap').classList.add('show');
      document.getElementById('btn-group').classList.add('show');
    }, 500);
  }

  async function generateTTS(text, model) {
    const cleanText = text.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim().substring(0, 500);
    let body = {};
    if (model === 'fal-ai/gemini-tts') {
      body = { prompt: cleanText, voice: 'Kore', language: 'Korean (South Korea)', model: 'gemini-2.5-flash-tts' };
    } else if (model.includes('minimax')) {
      body = { text: cleanText, voice_id: 'Korean_GirlFriend', speed: 1.0 };
    } else if (model.includes('elevenlabs')) {
      body = { text: cleanText, voice_id: 'pNInz6obpgDQGcFmaJgB', language_code: 'ko' };
    } else {
      body = { text: cleanText };
    }
    const resp = await fetch(`https://fal.run/${model}`, {
      method: 'POST',
      headers: { 'Authorization': `Key ${falKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    return data.audio?.url || data.audio_url || data.url || data.audio;
  }

  function getAudioDuration(url) {
    return new Promise(resolve => {
      const a = new Audio(url);
      a.addEventListener('loadedmetadata', () => resolve(a.duration));
      a.addEventListener('error', () => resolve(3));
      setTimeout(() => resolve(3), 5000);
    });
  }

  function renderThumbs() {
    const grid = document.getElementById('thumbs-grid');
    grid.innerHTML = '';
    slides.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.innerHTML = `<img src="${s.dataUrl}"><span class="thumb-badge">${i+1}</span>${s.audioUrl ? '<span class="thumb-audio">🔊</span>' : ''}`;
      div.onclick = () => goToSlide(i);
      grid.appendChild(div);
    });
  }

  function goToSlide(i) {
    if (!slides.length) return;
    currentSlide = i;
    document.getElementById('player-img').src = slides[i].dataUrl;
    document.getElementById('slide-info').textContent = `${i+1} / ${slides.length}`;
    const audio = document.getElementById('audio-player');
    if (slides[i].audioUrl) {
      audio.src = slides[i].audioUrl;
      audio.style.display = 'block';
      if (isPlaying) audio.play();
    } else {
      audio.src = '';
      audio.style.display = 'none';
    }
  }

  function prevSlide() { goToSlide(currentSlide > 0 ? currentSlide - 1 : slides.length - 1); }
  function nextSlide() { goToSlide(currentSlide < slides.length - 1 ? currentSlide + 1 : 0); }

  function togglePlay() {
    isPlaying = !isPlaying;
    document.getElementById('play-btn').textContent = isPlaying ? '⏸' : '▶';
    const audio = document.getElementById('audio-player');
    if (isPlaying) {
      if (slides[currentSlide].audioUrl) {
        audio.play();
        audio.onended = () => {
          if (!isPlaying) return;
          const dur = document.getElementById('slide-duration').value;
          const delay = dur === 'auto' ? 500 : 500;
          setTimeout(() => {
            if (!isPlaying) return;
            if (currentSlide < slides.length - 1) nextSlide();
            else { isPlaying = false; document.getElementById('play-btn').textContent = '▶'; }
          }, delay);
        };
      } else {
        const dur = document.getElementById('slide-duration').value;
        const ms = dur === 'auto' ? 3000 : parseInt(dur);
        playTimer = setTimeout(() => { if (isPlaying) nextSlide(); }, ms);
      }
    } else {
      clearTimeout(playTimer);
      audio.pause();
    }
  }

  async function downloadZip() {
    const zip = new JSZip();
    slides.forEach(s => { zip.file(s.name, s.dataUrl.split(',')[1], { base64: true }); });
    const blob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'cardnews_slides.zip';
    a.click();
  }

  async function downloadVideo() {
    const btn = document.getElementById('btn-video');
    btn.textContent = '⏳ 영상 생성 중...';
    btn.disabled = true;

    const canvas = document.createElement('canvas');
    canvas.width = 1080; canvas.height = 1350;
    const ctx = canvas.getContext('2d');
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const actx = new AudioCtx();
    const dest = actx.createMediaStreamDestination();
    const stream = canvas.captureStream(30);
    stream.addTrack(dest.stream.getAudioTracks()[0]);

    const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9,opus', videoBitsPerSecond: 8000000 });
    const chunks = [];
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: 'video/webm' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'cardnews_video.webm';
      a.click();
      btn.textContent = '🎬 음성 포함 영상 다운로드 (WebM)';
      btn.disabled = false;
      actx.close();
    };

    recorder.start(100);
    const fps = 30;
    const durSetting = document.getElementById('slide-duration').value;

    for (let s = 0; s < slides.length; s++) {
      const slide = slides[s];
      const duration = durSetting === 'auto'
        ? (slide.audioDuration > 0 ? slide.audioDuration * 1000 + 500 : 3000)
        : parseInt(durSetting);

      const img = new Image();
      img.src = slide.dataUrl;
      await new Promise(r => img.onload = r);

      if (slide.audioUrl && falKey) {
        try {
          const resp = await fetch(slide.audioUrl);
          const buf = await resp.arrayBuffer();
          const audioBuf = await actx.decodeAudioData(buf);
          const src = actx.createBufferSource();
          src.buffer = audioBuf;
          src.connect(dest);
          src.start(actx.currentTime);
        } catch(e) { console.warn('오디오 실패:', e); }
      }

      const startTime = Date.now();
      while (Date.now() - startTime < duration) {
        const p = (Date.now() - startTime) / duration;
        ctx.clearRect(0, 0, 1080, 1350);
        ctx.globalAlpha = p < 0.07 ? p / 0.07 : p > 0.93 ? (1 - p) / 0.07 : 1;
        ctx.drawImage(img, 0, 0, 1080, 1350);
        await new Promise(r => setTimeout(r, 1000 / fps));
      }
    }
    recorder.stop();
  }

  function resetAll() {
    slides = [];
    currentSlide = 0;
    isPlaying = false;
    clearTimeout(playTimer);
    document.getElementById('audio-player').pause();
    document.getElementById('thumbs-grid').innerHTML = '';
    document.getElementById('preview-section').classList.remove('show');
    document.getElementById('player-wrap').classList.remove('show');
    document.getElementById('btn-group').classList.remove('show');
